name: AIMemoryReader
options:
  bundleIdPrefix: com.aitools
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.40"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
packages:
  swift-markdown-ui:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.0"
  Splash:
    url: https://github.com/JohnSundell/Splash
    from: "0.16.0"
targets:
  AIMemoryReader:
    type: application
    platform: macOS
    sources:
      - path: AIMemoryReader/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aitools.ai-memory-reader
        PRODUCT_NAME: AI Memory Reader
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        INFOPLIST_KEY_CFBundleDisplayName: AI Memory Reader
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_STRICT_CONCURRENCY: complete
    dependencies:
      - package: swift-markdown-ui
        product: MarkdownUI
      - package: Splash
        product: Splash

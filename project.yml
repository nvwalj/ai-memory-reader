name: AIMemoryReader
options:
  bundleIdPrefix: com.aitools
  deploymentTarget:
    macOS: "15.0"
    iOS: "17.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.40"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
packages:
  swift-markdown-ui:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.0"
  Splash:
    url: https://github.com/JohnSundell/Splash
    from: "0.16.0"
targets:
  AIMemoryReader:
    type: application
    platform: macOS
    sources:
      - path: AIMemoryReader/Sources
    resources:
      - path: AIMemoryReader/Sources/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aitools.ai-memory-reader
        PRODUCT_NAME: AI Memory Reader
        MARKETING_VERSION: "0.3.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        INFOPLIST_KEY_CFBundleDisplayName: AI Memory Reader
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: AIMemoryReader/Sources/Resources/Info.plist
        SWIFT_STRICT_CONCURRENCY: complete
    dependencies:
      - package: swift-markdown-ui
        product: MarkdownUI
      - package: Splash
        product: Splash

  AIMemoryReader-iOS:
    type: application
    platform: iOS
    sources:
      - path: AIMemoryReader/Sources
    resources:
      - path: AIMemoryReader/Sources/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aitools.ai-memory-reader-ios
        PRODUCT_NAME: AI Memory Reader
        MARKETING_VERSION: "0.3.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: AI Memory Reader
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: AIMemoryReader/Sources/Resources/Info.plist
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    dependencies:
      - package: swift-markdown-ui
        product: MarkdownUI
      - package: Splash
        product: Splash
